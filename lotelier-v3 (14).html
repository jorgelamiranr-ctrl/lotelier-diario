*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:#F7F7F6;color:#1A1A1A;-webkit-font-smoothing:antialiased}

/* Agrandir Grand via local @font-face fallback to Impact */
@font-face{font-family:'Agrandir';src:local('Agrandir Grand'),local('AgrandirGrand-Bold'),local('Impact');font-weight:900}

/* -- MOBILE RESPONSIVE -- */
@media (max-width: 768px) {
  .sidebar { display: none !important; }
  .mobile-nav { display: flex !important; }
  .main-content { padding: 12px !important; }
  .metrics-grid { grid-template-columns: repeat(2,1fr) !important; }
  .editor-layout { flex-direction: column !important; }
  .editor-thumbs { width: 100% !important; flex-direction: row !important; overflow-x: auto !important; overflow-y: hidden !important; max-height: 140px !important; padding: 8px !important; }
  .editor-panel { width: 100% !important; max-height: 50vh !important; overflow-y: auto !important; }

}
@media (min-width: 769px) {
  .mobile-nav { display: none !important; }
}

(function(){

var e=React.createElement,useState=React.useState,useEffect=React.useEffect,useRef=React.useRef;

/* STORAGE */
var S={
  key:function(){try{return localStorage.getItem('lo_key')||''}catch(x){return''}},
  setKey:function(k){try{localStorage.setItem('lo_key',k)}catch(x){}},
  pieces:function(){try{return JSON.parse(localStorage.getItem('lo_pieces')||'[]')}catch(x){return[]}},
  save:function(p){var ps=S.pieces(),i=ps.findIndex(function(x){return x.id===p.id});if(i>=0)ps[i]=p;else ps.unshift(p);try{localStorage.setItem('lo_pieces',JSON.stringify(ps))}catch(x){}},
  del:function(id){try{localStorage.setItem('lo_pieces',JSON.stringify(S.pieces().filter(function(p){return p.id!==id})))}catch(x){}},
  briefing:function(){try{var d=JSON.parse(localStorage.getItem('lo_briefing')||'null');if(!d)return null;if((Date.now()-d.ts)/3600000>8)return null;return d.items}catch(x){return null}},
  saveBriefing:function(d){try{localStorage.setItem('lo_briefing',JSON.stringify({items:d,ts:Date.now()}))}catch(x){}}
};

/* API CLAUDE */
var callClaude=function(k,sys,user,onStream){
  return fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-opus-4-5',max_tokens:2000,stream:!!onStream,system:sys,messages:[{role:'user',content:user}]})
  }).then(function(r){
    if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message||'Error API')});
    if(onStream){
      var rd=r.body.getReader(),dc=new TextDecoder(),full='';
      var read=function(){return rd.read().then(function(x){
        if(x.done)return full;
        dc.decode(x.value).split('\n').filter(function(l){return l.startsWith('data: ')}).forEach(function(l){
          try{var d=JSON.parse(l.slice(6));if(d.delta&&d.delta.text){full+=d.delta.text;onStream(full)}}catch(e){}
        });
        return read();
      })};
      return read();
    }
    return r.json().then(function(d){return d.content[0].text});
  });
};

  return fetch(url,{signal:AbortSignal.timeout(12000)})
    .then(function(r){return r.json()})
    .then(function(d){
      if(!d.items||!d.items.length)return[];
      return d.items.map(function(item){
        return{
          id:Math.random().toString(36).slice(2,10),
          title:(item.title||'').trim(),
          description:(item.description||'').replace(/<[^>]+>/g,'').trim().slice(0,220),
          link:item.link||'',pubDate:item.pubDate||'',
          source:f.name,local:f.local,cat:f.cat
        };
      }).filter(function(i){
        if(i.title.length<10)return false;
        if(f.filtrarTurismo)return esTurismo(i.title,i.description);
        return true;
      });
    })
    .catch(function(){return[]});
};

/* CANVAS RENDER - Magazine style */
var wrapText=function(ctx,text,x,y,maxW,lineH,maxLines){
  if(!text)return y;
  var words=text.split(' '),line='',lines=[],cy=y;
  for(var i=0;i<words.length;i++){
    var word=words[i];
    /* If a single word overflows, shrink font temporarily or force break */
    var test=line?line+' '+word:word;
    if(ctx.measureText(test).width>maxW&&line){
      lines.push(line);line=word;
      if(maxLines&&lines.length>=maxLines){lines[lines.length-1]+='...';break}
    } else line=test;
  }
  if(line&&(!maxLines||lines.length<maxLines))lines.push(line);
  lines.forEach(function(l){
    /* Clip line to maxW using fillText with clipping rect */
    ctx.save();
    ctx.beginPath();ctx.rect(x,cy-lineH,maxW,lineH+10);ctx.clip();
    ctx.fillText(l,x,cy);
    ctx.restore();
    cy+=lineH;
  });
  return cy;
};

/* Scale font to fit text in one line */
var fitText=function(ctx,text,x,y,maxW,maxSize,minSize){
  var size=maxSize;
  ctx.font=ctx.font.replace(/\d+px/,size+'px');
  while(ctx.measureText(text).width>maxW&&size>minSize){
    size-=4;
    ctx.font=ctx.font.replace(/\d+px/,size+'px');
  }
  ctx.fillText(text,x,y);
  return size;
};

var addGrain=function(ctx,W,H,intensity){
  intensity=intensity||20;
  var d=ctx.getImageData(0,0,W,H),px=d.data;
  for(var i=0;i<px.length;i+=4){
    var n=(Math.random()-0.5)*intensity*2;
    px[i]=Math.max(0,Math.min(255,px[i]+n));
    px[i+1]=Math.max(0,Math.min(255,px[i+1]+n));
    px[i+2]=Math.max(0,Math.min(255,px[i+2]+n));
  }
  ctx.putImageData(d,0,0);
};

var renderSlide=function(sl,idx,total,bgImg){
  /* Fonts should be pre-loaded via loadFonts() */
  var W=1080,H=1350;
  var cv=document.createElement('canvas');cv.width=W;cv.height=H;
  var ctx=cv.getContext('2d');
  var P=60;

  /* Background */
  if(bgImg){
    try{
      var ratio=Math.max(W/bgImg.width,H/bgImg.height);
      var dw=bgImg.width*ratio,dh=bgImg.height*ratio;
      ctx.drawImage(bgImg,(W-dw)/2,(H-dh)/2,dw,dh);
      /* Dark overlay */
      ctx.fillStyle='rgba(10,15,30,0.62)';ctx.fillRect(0,0,W,H);
    }catch(x){
      ctx.fillStyle='#202C44';ctx.fillRect(0,0,W,H);
    }
  } else {
    ctx.fillStyle='#202C44';ctx.fillRect(0,0,W,H);
  }

  /* Grain texture */
  addGrain(ctx,W,H,18);

  /* Top bar */
  ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillRect(0,0,W,90);

  /* Logo top-left */
  ctx.font='300 28px AGL,Arial';ctx.fillStyle='#fff';
  ctx.fillText("L'OTELIER",P,62);
  ctx.font='300 24px AGL,Arial';ctx.fillStyle='#3FB378';
  ctx.fillText(' diario',P+ctx.measureText("L'OTELIER")+4,62);

  /* Collection top-right */
  ctx.font='300 16px AGL,Arial';ctx.fillStyle='#3FB378';ctx.textAlign='right';
  var _d=new Date(),_m=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];var _ds=_d.getDate()+' '+_m[_d.getMonth()]+' '+_d.getFullYear();
  ctx.fillStyle='#3FB378';ctx.fillText(_ds,W-P,48);
  ctx.font='300 14px AGL,Arial';ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillText(String(idx+1).padStart(2,'0')+'/'+String(total).padStart(2,'0'),W-P,58);
  ctx.textAlign='left';

  /* Green accent line */
  ctx.fillStyle='#3FB378';ctx.fillRect(P,110,50,4);

  /* CONTENT per tipo */
  if(sl.tipo==='portada'){
    /* Giant headline - Agrandir Grand Heavy - constrained */
    var titTxt=(sl.titular||'').toUpperCase();
    ctx.font='900 152px AGH,Impact,Arial Black';
    /* Auto-scale if too wide for 1 line */
    var titW=ctx.measureText(titTxt).width;
    var fontSize=Math.min(152,Math.floor(152*(W-P*2)/Math.max(titW/3,W-P*2)));
    fontSize=Math.max(fontSize,64);
    ctx.font='900 '+fontSize+'px AGH,Impact,Arial Black';
    ctx.fillStyle='#3FB378';
    var y=wrapText(ctx,titTxt,P,340,W-P*2,fontSize+20,3);
    /* Subheadline */
    if(sl.subtitulo){
      ctx.font='300 38px AGL,Arial';ctx.fillStyle='#fff';
      wrapText(ctx,sl.subtitulo,P,y+24,W-P*2,50,3);
    }
    /* Quote block if acento */
    if(sl.acento_verde){
      ctx.fillStyle='rgba(63,179,120,0.12)';ctx.fillRect(P-10,y+90,W-P*2+20,130);
      ctx.font='300 33px AGL,Arial';ctx.fillStyle='#3FB378';
      wrapText(ctx,'"'+sl.acento_verde+'"',P+14,y+138,W-P*2-20,44,2);
    }
  } else if(sl.tipo==='dato'){
    /* Big number - Agrandir Heavy */
    ctx.font='900 230px AGH,Impact,Arial Black';ctx.fillStyle='#3FB378';
    ctx.fillText(sl.numero_destacado||'',P,490);
    ctx.font='300 40px AGL,Arial';ctx.fillStyle='#fff';
    var y2=wrapText(ctx,sl.contexto||'',P,540,W-P*2,52,2);
    if(sl.dato_extra){
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(P,y2+12,W-P*2,1);
      ctx.font='300 29px AGL,Arial';ctx.fillStyle='rgba(255,255,255,0.5)';
      wrapText(ctx,sl.dato_extra,P,y2+42,W-P*2,40,2);
    }
  } else if(sl.tipo==='texto'){
    /* Section headline - Agrandir */
    ctx.font='900 90px AGH,Impact,Arial Black';ctx.fillStyle='#fff';
    var y3=wrapText(ctx,(sl.titular||'').toUpperCase(),P,300,W-P*2,94,3);
    ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(P,y3+12,W-P*2,1);
    ctx.font='300 33px AGL,Arial';ctx.fillStyle='rgba(255,255,255,0.75)';
    wrapText(ctx,sl.cuerpo||'',P,y3+46,W-P*2,48,5);
  } else if(sl.tipo==='cita'){
    /* Full quote - Agrandir Light for elegance */
    ctx.font='900 80px AGH,Impact,Arial Black';ctx.fillStyle='rgba(63,179,120,0.25)';ctx.fillText('"',P-8,320);
    ctx.font='300 48px AGL,Arial';ctx.fillStyle='#fff';
    var y4=wrapText(ctx,sl.cita||'',P,355,W-P*2,64,5);
    ctx.fillStyle='#3FB378';ctx.fillRect(P,y4+18,64,3);
    ctx.font='300 27px AGL,Arial';ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.fillText((sl.autor||'').toUpperCase(),P,y4+58);
  } else if(sl.tipo==='cierre'){
    ctx.font='900 120px AGH,Impact,Arial Black';ctx.fillStyle='#fff';
    var y5=wrapText(ctx,(sl.pregunta||'').toUpperCase(),P,320,W-P*2,124,4);
    ctx.fillStyle='#3FB378';ctx.fillRect(P,y5+22,120,5);
  }

  /* Bottom bar */
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,H-90,W,90);
  ctx.font='300 18px AGL,Arial';ctx.fillStyle='#3FB378';
  ctx.fillText('ORIGINAL MAGAZINE',P,H-50);
  ctx.textAlign='right';
  ctx.fillStyle='rgba(255,255,255,0.5)';
  var d=new Date();
  ctx.fillText(d.getDate()+' '+['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'][d.getMonth()]+' '+d.getFullYear(),W-P,H-50);
  ctx.textAlign='left';
  ctx.font='300 15px AGL,Arial';ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.fillText('FUENTE: '+(sl.fuente||'LOTELIER DIARIO'),P,H-22);

  return cv;
};

/* SLIDE PREVIEW - small version for editor */
var SlideThumb=function(props){
  var sl=props.slide,idx=props.idx,total=props.total,size=props.size||200,bgImg=props.bgImg;
  var H=Math.round(1350/1080*size);
  var canRef=useRef(null);
  useEffect(function(){
    if(!canRef.current)return;
    try{
      var cv=renderSlide(sl,idx,total,bgImg||null);
      var ctx=canRef.current.getContext('2d');
      canRef.current.width=size;canRef.current.height=H;
      ctx.drawImage(cv,0,0,size,H);
    }catch(err){console.warn('thumb err',err)}
  },[sl,idx,total,bgImg,size]);
  return e('canvas',{ref:canRef,width:size,height:H,style:{borderRadius:4,display:'block',flexShrink:0}});
};

/* BRIEFING */
function Briefing(p){
  var s1=useState('idle'),state=s1[0],setState=s1[1];
  var s2=useState([]),items=s2[0],setItems=s2[1];
  var s3=useState({done:0,total:FUENTES.length}),prog=s3[0],setProg=s3[1];
  var s4=useState('all'),filter=s4[0],setFilter=s4[1];
  var s5=useState(''),manualText=s5[0],setManualText=s5[1];
  var s6=useState(false),procesando=s6[0],setProcesando=s6[1];
  var s7=useState(''),procErr=s7[0],setProcErr=s7[1];

  useEffect(function(){var c=S.briefing();if(c&&c.length>0){setItems(c);setState('done')}},[]);

  var cargarRSS=function(){
    setState('loading');setProg({done:0,total:FUENTES.length});
    var todos=[];
    var runBatch=function(bi){
      if(bi>=FUENTES.length){
        var seen=new Set();
        var deduped=todos.filter(function(item){
          var k=item.title.toLowerCase().slice(0,50);
          if(seen.has(k))return false;seen.add(k);return true;
        });
        deduped.sort(function(a,b){try{return new Date(b.pubDate)-new Date(a.pubDate)}catch(x){return 0}});
        S.saveBriefing(deduped);setItems(deduped);setState(deduped.length>0?'done':'error');return;
      }
      var batch=FUENTES.slice(bi,bi+3);
      Promise.all(batch.map(fetchFuente)).then(function(results){
        results.forEach(function(r){todos=todos.concat(r)});
        setProg({done:Math.min(bi+3,FUENTES.length),total:FUENTES.length});
        runBatch(bi+3);
      });
    };
    runBatch(0);
  };

  var cargarClaude=function(){
    if(!p.apiKey){p.setModal(true);return}
    setState('loading');setProg({done:0,total:1});
    var hoy=new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

/* EDITOR CARRUSEL - Magazine Style */
function EdCarrusel(p){
  var s1=useState(p.piece.content&&p.piece.content.slides||[]),slides=s1[0],setSlides=s1[1];
  var s2=useState(0),active=s2[0],setActive=s2[1];
  var s3=useState(false),saved=s3[0],setSaved=s3[1];
  var s4=useState(null),bgImg=s4[0],setBgImg=s4[1];
  var s5=useState(false),exporting=s5[0],setExporting=s5[1];
  var fileRef=useRef(null);

  var sl=slides[active]||{};

  var upd=function(f,v){var ns=slides.slice();ns[active]=Object.assign({},ns[active]);ns[active][f]=v;setSlides(ns);setSaved(false)};
  var save=function(){var np=Object.assign({},p.piece,{content:Object.assign({},p.piece.content,{slides:slides}),status:'ready'});S.save(np);p.onUpdate(np);setSaved(true);setTimeout(function(){setSaved(false)},2000)};

  var loadImage=function(ev){
    var file=ev.target.files&&ev.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e2){
      var img=new Image();
      img.onload=function(){setBgImg(img)};
      img.src=e2.target.result;
    };
    reader.readAsDataURL(file);
  };



  var exportOne=function(){
    loadFonts().then(function(){
      var cv=renderSlide(sl,active,slides.length,bgImg);
      var url=cv.toDataURL('image/png',0.96);
      dlFile(url,'lotelier_slide_'+String(active+1).padStart(2,'0')+'.png');
      var w=window.open('','_blank');
      if(w){w.document.write('<img src="'+url+'" style="max-width:100%;display:block"><p style="font-family:sans-serif;padding:10px;color:#666">Clic derecho > Guardar imagen</p>')}
    });
  };
  var exportAll=function(){
    setExporting(true);
    loadFonts().then(function(){
      var delay=0;
      slides.forEach(function(sl2,i){
        setTimeout(function(){
          var cv=renderSlide(sl2,i,slides.length,bgImg);

function EdVideo(p){

  var s2=useState(p.piece.content&&p.piece.content.copy_caption||''),cap=s2[0],setCap=s2[1];
  var s3=useState(0),active=s3[0],setActive=s3[1];
  var s4=useState(false),saved=s4[0],setSaved=s4[1];
  var s5=useState(null),videoBgImg=s5[0],setVideoBgImg=s5[1];
  var vidFileRef=useRef(null);
  var loadVideoBg=function(ev){
    var file=ev.target.files&&ev.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e2){var img=new Image();img.onload=function(){setVideoBgImg(img)};img.src=e2.target.result};
    reader.readAsDataURL(file);
  };

  var upd=function(i,f,v){var nb=bloques.slice();nb[i]=Object.assign({},nb[i]);nb[i][f]=v;setBloques(nb);setSaved(false)};
  var save=function(){var np=Object.assign({},p.piece,{content:Object.assign({},p.piece.content,{bloques:bloques,copy_caption:cap}),status:'ready'});S.save(np);p.onUpdate(np);setSaved(true);setTimeout(function(){setSaved(false)},2000)};

  var renderReelFrame=function(bl,idx,total,bgImg){
    var W=1080,H=1920,P=80;
    var cv=document.createElement('canvas');
    cv.width=W;cv.height=H;
    var ctx=cv.getContext('2d');

    /* Background photo or dark gradient */
    if(bgImg){
      var ratio=Math.max(W/bgImg.width,H/bgImg.height);
      var dw=bgImg.width*ratio,dh=bgImg.height*ratio;
      ctx.drawImage(bgImg,(W-dw)/2,(H-dh)/2,dw,dh);
      /* Dark overlay so text is always readable */
      ctx.fillStyle='rgba(0,0,0,0.52)';
      ctx.fillRect(0,0,W,H);
    } else {
      ctx.fillStyle='#0e1420';
      ctx.fillRect(0,0,W,H);
    }

    addGrain(ctx,W,H,14);

    /* Logo top-left */
    try{
      ctx.drawImage(CANVAS_LOGO,P,30,200,52);
    }catch(x){}

    /* Progress dots top-right */
    ctx.font='300 22px AGL,Arial';
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.textAlign='right';
    ctx.fillText(String(idx+1).padStart(2,'0')+' / '+String(total).padStart(2,'0'),W-P,60);
    ctx.textAlign='left';

    /* Green line accent */
    ctx.fillStyle='#3FB378';
    ctx.fillRect(P,140,48,4);

    /* Tipo label */
    ctx.font='300 24px AGL,Arial';
    ctx.fillStyle='#3FB378';
    ctx.fillText((bl.tipo||'').toUpperCase(),P,196);

    /* Main copy text - simple and clean */
    var copy=(bl.copy||'').trim();
    var maxW=W-P*2;
    var y=300;

    /* All text in Grand Light 72px - clean and readable */
    ctx.font='300 72px AGL,Arial';
    ctx.fillStyle='#ffffff';
    var words=copy.split(' ');
    var line='';
    var lineH=90;
    for(var i=0;i<words.length;i++){
      var test=line?line+' '+words[i]:words[i];
      if(ctx.measureText(test).width>maxW&&line){
        ctx.save();
        ctx.beginPath();ctx.rect(P,y-lineH+10,maxW,lineH+4);ctx.clip();
        ctx.fillText(line,P,y);
        ctx.restore();
        y+=lineH;
        line=words[i];
        if(y>H-280)break;
      } else {
        line=test;
      }
    }
    if(line&&y<=H-280){
      ctx.save();
      ctx.beginPath();ctx.rect(P,y-lineH+10,maxW,lineH+4);ctx.clip();
      ctx.fillText(line,P,y);
      ctx.restore();
    }

    /* Bottom bar */
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(0,H-90,W,90);

    /* Progress bar */
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.fillRect(P,H-55,W-P*2,2);
    ctx.fillStyle='#3FB378';
    ctx.fillRect(P,H-55,(W-P*2)*((idx+1)/total),2);

    /* Duration */
    ctx.font='300 22px AGL,Arial';
    ctx.fillStyle='rgba(63,179,120,0.8)';
    ctx.fillText(bl.duracion||'',P,H-22);

    ctx.font='300 20px AGL,Arial';
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.textAlign='right';
    ctx.fillText('LOTELIER DIARIO',W-P,H-22);
    ctx.textAlign='left';

    return cv;
  };

  var exportFrames=function(){
    loadFonts().then(function(){
      var delay=0;
      bloques.forEach(function(bl,i){
        setTimeout(function(){
          var cv=renderReelFrame(bl,i,bloques.length,videoBgImg,null);

          dlFile(url,'lotelier_reel_'+String(i+1).padStart(2,'0')+'.png');

          if(i===0){var w=window.open('','_blank');if(w){w.document.write('<img src="'+url+'" style="max-width:100%;display:block"><p style="font-family:sans-serif;padding:8px;color:#666">Clic derecho > Guardar imagen</p>')}}
        },delay);
        delay+=900;
      });
    });
  };
  var exportScript=function(){
    var txt='GUION VIDEO - LOTELIER DIARIO\n';
    txt+='Titular: '+(p.piece.analysis&&p.piece.analysis.titular_editorial||'')+'\n\n';
    bloques.forEach(function(b){txt+='['+b.tipo.toUpperCase()+' - '+b.duracion+']\n'+b.copy+'\n\n'});
    txt+='\nCAPTION:\n'+cap;
    var blob=new Blob([txt],{type:'text/plain'});
    var url=URL.createObjectURL(blob);
    dlFile(url,'lotelier_guion_video.txt');
    URL.revokeObjectURL(url);
  };

  var b=bloques[active]||{};
  var TC={intro:'#3FB378',contexto:'#fff',dato:'#3FB378',desarrollo:'#fff',cierre:'#3FB378'};

  return e('div',{style:{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}},
    Top('Editor Video / Reels',e('div',{style:{display:'flex',gap:7,alignItems:'center'}},
      saved?e('span',{style:{fontSize:11,fontWeight:600,color:'#3FB378'}},'Guardado'):null,
      Btn({ch:'Biblioteca',v:'sec',sz:'sm',onClick:function(){p.go('biblioteca')}}),
      Btn({ch:'Guardar',v:'sec',sz:'sm',onClick:save}),
      Btn({ch:'Exportar frames PNG',v:'pri',sz:'sm',onClick:exportFrames}),
    Btn({ch:'Guion TXT',v:'sec',sz:'sm',onClick:exportScript})
    )),
    e('div',{style:{display:'flex',flex:1,overflow:'hidden'}},
      /* Bloques panel */
      e('div',{style:{width:200,background:'#fff',borderRight:'1px solid #E4E3E0',overflow:'auto',padding:'12px'}},
        e('div',{style:{fontSize:10,fontWeight:700,color:'#9E9B97',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:10}},'Bloques del video'),
        bloques.map(function(bl,i){
          return e('div',{key:i,onClick:function(){setActive(i)},style:{marginBottom:6,padding:'10px 11px',borderRadius:8,background:active===i?'#EBF7F2':'#F0EFED',border:'1px solid '+(active===i?'#3FB378':'transparent'),cursor:'pointer'}},
            e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}},
              e('span',{style:{fontSize:10,fontWeight:700,color:active===i?'#1E6B43':'#6B6966',textTransform:'uppercase'}},'#'+(i+1)+' '+bl.tipo),
              e('span',{style:{fontSize:10,color:'#9E9B97',fontWeight:600}},bl.duracion)

            e('div',{style:{fontSize:12,lineHeight:1.35,color:active===i?'#202C44':'#6B6966',overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}},bl.copy)
          );
        })
      ),
      /* Preview */
      e('div',{style:{flex:1,background:'#111',display:'flex',alignItems:'center',justifyContent:'center',padding:'28px',position:'relative',flexDirection:'column',gap:12}},
        e('canvas',{

/* APP */
function App(){
  var s1=useState('home'),act=s1[0],setAct=s1[1];
  var s2=useState(null),pre=s2[0],setPre=s2[1];
  var s3=useState(S.key()),apiKey=s3[0],setApiKey=s3[1];
  var s4=useState(false),modal=s4[0],setModal=s4[1];
  var s5=useState(S.pieces()),pieces=s5[0],setPieces=s5[1];
  var s6=useState(null),pfe=s6[0],setPfe=s6[1];

  var go=function(screen){setAct(screen);if(screen!=='nueva')setPre(null)};
  var onSaved=function(){setPieces(S.pieces())};
  var onUpdate=function(p2){S.save(p2);setPieces(S.pieces());if(pfe&&pfe.id===p2.id)setPfe(p2)};
  var onDelete=function(id){S.del(id);setPieces(S.pieces())};
  var onApiSave=function(k){setApiKey(k);setModal(false)};

  var screen;
  var sp={go:go,setPre:setPre,apiKey:apiKey,setModal:setModal,pieces:pieces,setPFE:setPfe};
  if(act==='home')screen=e(Home,sp);
  else if(act==='briefing')screen=e(Briefing,sp);
  else if(act==='nueva')screen=e(Nueva,Object.assign({},sp,{pre:pre,onSaved:onSaved}));
  else if(act==='biblioteca')screen=e(Biblioteca,Object.assign({},sp,{onDelete:onDelete}));
  else if(act==='editor')screen=e(Editor,{piece:pfe,go:go,onUpdate:onUpdate});
  else if(act==='ajustes')screen=e(Ajustes,{apiKey:apiKey,setModal:setModal});
  else screen=e(Home,sp);

  var mobileNav=[
    {id:'home',l:'Home',ic:'#'},
    {id:'briefing',l:'Briefing',ic:'o'},
    {id:'nueva',l:'Nueva',ic:'+'},
    {id:'biblioteca',l:'Biblioteca',ic:'='},
    {id:'ajustes',l:'Ajustes',ic:'*'}
  ];
  return e('div',null,
    modal?e(ApiModal,{onSave:onApiSave,onClose:function(){setModal(false)},cur:apiKey}):null,
    e('div',{style:{display:'flex',minHeight:'100vh',background:'#F7F7F6'}},
      e(Sidebar,{act:act,go:go,apiKey:apiKey,setModal:setModal,pieces:pieces}),
      e('div',{style:{flex:1,display:'flex',flexDirection:'column',minWidth:0,paddingBottom:60}},
        screen
      )
    ),
    e('div',{className:'mobile-nav',style:{position:'fixed',bottom:0,left:0,right:0,height:60,background:'#fff',borderTop:'1px solid #E4E3E0',display:'none',alignItems:'center',justifyContent:'space-around',zIndex:100,boxShadow:'0 -2px 12px rgba(0,0,0,0.08)'}},
      mobileNav.map(function(item){
        var on=act===item.id;
        return e('div',{key:item.id,onClick:function(){go(item.id)},style:{display:'flex',flexDirection:'column',alignItems:'center',gap:3,cursor:'pointer',padding:'4px 8px',flex:1}},
          e('span',{style:{fontSize:18,color:on?'#3FB378':'#9E9B97'}},item.ic),
          e('span',{style:{fontSize:9,fontWeight:on?700:500,color:on?'#3FB378':'#9E9B97',letterSpacing:'0.05em'}},item.l)
        );
      })
    )
  );
}


/* -- PASSWORD PROTECTION -- */
var simpleHash=function(s){var h=0;for(var i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0}return'lh_'+Math.abs(h).toString(36)};
var getHash=function(){try{return localStorage.getItem('lo_pwhash')||''}catch(x){return''}};
var setHash=function(h){try{localStorage.setItem('lo_pwhash',h)}catch(x){}};
var isUnlocked=function(){try{return sessionStorage.getItem('lo_ok')==='1'}catch(x){return false}};
var setUnlocked=function(){try{sessionStorage.setItem('lo_ok','1')}catch(x){}};

function LoginScreen(p){
  var s1=useState(''),pw=s1[0],setPw=s1[1];
  var s2=useState(false),err=s2[0],setErr=s2[1];

  var submit=function(){
    if(!pw.trim())return;
    var h=simpleHash(pw);
    if(isFirst){setHash(h);setUnlocked();p.onLogin()}
    else if(h===getHash()){setUnlocked();p.onLogin()}
    else{setErr(true);setPw('')}
