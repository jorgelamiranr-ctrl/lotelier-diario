var callClaude=function(k,sys,user,onS){
  return fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-opus-4-5',max_tokens:2000,stream:!!onS,system:sys,messages:[{role:'user',content:user}]})
  }).then(function(r){
    if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message||'API error')});
    if(onS){
      var rd=r.body.getReader(),dc=new TextDecoder(),full='';
      function read(){return rd.read().then(function(x){
        if(x.done)return full;
        dc.decode(x.value).split('\n').filter(function(l){return l.startsWith('data: ')}).forEach(function(l){
          try{var d=JSON.parse(l.slice(6));if(d.delta&&d.delta.text){full+=d.delta.text;onS(full)}}catch(e){}
        });
        return read();
      })}
      return read();
    }
    return r.json().then(function(d){return d.content[0].text});
  });
};

var drawGrain=function(ctx,W,H,i){
  i=i||15;var d=ctx.getImageData(0,0,W,H),px=d.data;
  for(var j=0;j<px.length;j+=4){var n=(Math.random()-.5)*i*2;px[j]=Math.max(0,Math.min(255,px[j]+n));px[j+1]=Math.max(0,Math.min(255,px[j+1]+n));px[j+2]=Math.max(0,Math.min(255,px[j+2]+n))}
  ctx.putImageData(d,0,0);
};
var drawTape=function(ctx,x,y,w,h,a){
  ctx.save();ctx.translate(x,y);ctx.rotate((a||0)*Math.PI/180);
  ctx.globalAlpha=.5;ctx.fillStyle='#C8BFA8';ctx.fillRect(-w/2,-h/2,w,h);
  ctx.globalAlpha=.15;ctx.fillStyle='#fff';
  for(var i=-w/2;i<w/2;i+=8)ctx.fillRect(i,-h/2,4,h);
  ctx.globalAlpha=1;ctx.restore();
};
var drawAst=function(ctx,x,y,s,c){
  ctx.save();ctx.translate(x,y);ctx.strokeStyle=c;ctx.lineWidth=s*.13;ctx.lineCap='round';
  for(var i=0;i<3;i++){ctx.save();ctx.rotate(i*60*Math.PI/180);ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(0,s);ctx.stroke();ctx.restore()}
  ctx.restore();
};
var wrapTxt=function(ctx,text,x,y,mw,lh){
  var ws=(text||'').split(' '),line='',cy=y;
  for(var i=0;i<ws.length;i++){var t=line?line+' '+ws[i]:ws[i];if(ctx.measureText(t).width>mw&&line){ctx.fillText(line,x,cy);cy+=lh;line=ws[i]}else line=t}
  if(line){ctx.fillText(line,x,cy);cy+=lh}return cy;
};
var renderSlide=function(sl,idx,total){
  var W=1080,H=1350,P=76,cv=document.createElement('canvas');cv.width=W;cv.height=H;

  var dark=sl.tipo==='portada'||sl.tipo==='cierre'||idx===1||idx===4;
  var grn=sl.tipo==='cita';

  c.font='700 28px Montserrat,Arial,sans-serif';c.fillStyle=TC;c.fillText("L'OTELIER",P,52);
  var lw=c.measureText("L'OTELIER").width;
  c.font='italic 400 26px Georgia,serif';c.fillStyle=TC2;c.fillText(' diario',P+lw,52);
  c.font='600 18px Montserrat,Arial,sans-serif';c.fillStyle=TC2;c.textAlign='right';
  c.fillText(String(idx+1).padStart(2,'0')+' / '+String(total).padStart(2,'0'),W-P,52);c.textAlign='left';
  c.fillStyle=dark||grn?'rgba(255,255,255,0.1)':'rgba(32,44,68,0.08)';c.fillRect(P,70,W-P*2,1);
  c.globalAlpha=.14;drawAst(c,W-92,195,20,dark?'#3FB378':'#202C44');drawAst(c,92,H-195,13,dark?'rgba(63,179,120,0.5)':'rgba(32,44,68,0.2)');c.globalAlpha=1;
  var y=156;c.fillStyle='#3FB378';c.fillRect(P,y,46,4);y+=32;

    c.font='900 108px "Barlow Condensed",Impact,sans-serif';c.fillStyle=TC;

    if(sl.acento_verde){c.fillStyle='#3FB378';y=wrapTxt(c,sl.acento_verde.toUpperCase(),P,y+2,W-P*2,116)}
    y+=16;c.fillStyle=dark?'rgba(255,255,255,0.08)':'rgba(32,44,68,0.07)';c.fillRect(P,y,W-P*2,1);y+=22;

    c.font='900 214px "Barlow Condensed",Impact,sans-serif';c.fillStyle=dark?'#3FB378':TC;
    c.fillText(sl.numero_destacado||'',P,y+196);y+=244;
    c.font='500 36px Montserrat,Arial,sans-serif';c.fillStyle=TC;c.fillText(sl.contexto||'',P,y+20);y+=70;
    if(sl.dato_extra){c.fillStyle=dark?'rgba(255,255,255,0.12)':'rgba(32,44,68,0.09)';c.fillRect(P,y,W-P*2,1);y+=26;c.font='400 26px Montserrat,Arial,sans-serif';c.fillStyle=TC2;c.fillText(sl.dato_extra,P,y)}
  }else if(sl.tipo==='texto'){
    c.font='900 76px "Barlow Condensed",Impact,sans-serif';c.fillStyle=TC;
    y=wrapTxt(c,(sl.titular||'').toUpperCase(),P,y+66,W-P*2,86);y+=10;
    c.fillStyle=dark?'rgba(255,255,255,0.09)':'rgba(32,44,68,0.07)';c.fillRect(P,y,W-P*2,1);y+=30;
    c.font='400 30px Montserrat,Arial,sans-serif';c.fillStyle=TC2;wrapTxt(c,sl.cuerpo||'',P,y,W-P*2,45);
  }else if(sl.tipo==='cita'){
    c.font='900 150px "Barlow Condensed",sans-serif';c.fillStyle='rgba(255,255,255,0.2)';c.fillText('\u201c',P-8,y+108);y+=66;
    c.font='italic 600 44px Georgia,serif';c.fillStyle='#F2EFEA';
    y=wrapTxt(c,sl.cita||'',P,y,W-P*2,62);y+=18;
    c.fillStyle='rgba(255,255,255,0.3)';c.fillRect(P,y,52,2);y+=22;
    c.font='700 22px Montserrat,Arial,sans-serif';c.fillStyle='rgba(255,255,255,0.6)';
    c.fillText((sl.autor||'').toUpperCase(),P,y);
  }else if(sl.tipo==='cierre'){
    c.font='900 90px "Barlow Condensed",Impact,sans-serif';c.fillStyle=TC;
    y=wrapTxt(c,(sl.pregunta||'').toUpperCase(),P,y+80,W-P*2,102);
    if(sl.fuente){y+=18;c.font='500 24px Montserrat,Arial,sans-serif';c.fillStyle=TC2;c.fillText(sl.fuente,P,y)}
  }
  c.fillStyle=dark||grn?'rgba(255,255,255,0.06)':'rgba(32,44,68,0.04)';c.fillRect(0,H-66,W,66);
  c.font='600 15px Montserrat,Arial,sans-serif';c.fillStyle=dark||grn?'rgba(242,239,234,0.4)':'rgba(32,44,68,0.35)';
  c.fillText("L'OTELIER DIARIO  \u00b7  TOURISM & LIFESTYLE",P,H-22);
  drawGrain(c,W,H,dark||grn?16:12);
  return cv;
};
var renderMini=function(data){
  var W=1080,H=1920,P=108,cv=document.createElement('canvas');cv.width=W;cv.height=H;
  var c=cv.getContext('2d');c.fillStyle=data.bg_color||'#202C44';c.fillRect(0,0,W,H);
  drawTape(c,W/2,0,130,36,0);drawTape(c,0,H*.46,36,100,-5);

    c.fillStyle=w.toLowerCase()===(data.acento||'').toLowerCase()?'#3FB378':'#F2EFEA';

  });

  c.globalAlpha=.16;drawAst(c,W-140,360,38,'#3FB378');drawAst(c,110,H-280,24,'rgba(63,179,120,0.55)');c.globalAlpha=1;
  c.font='700 28px Montserrat,Arial,sans-serif';c.fillStyle='rgba(242,239,234,0.2)';c.fillText("L'OTELIER DIARIO",P,H-90);
  drawGrain(c,W,H,18);return cv;
};
var dlSlide=function(cv,name){
  var dataUrl=cv.toDataURL('image/png',0.96);
  var a=document.createElement('a');
  a.href=dataUrl;
  a.download=name;
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){document.body.removeChild(a)},100);
};
var dlAll=function(slides){
  // Download one by one with delay to avoid browser blocking
  var doNext=function(i){
    if(i>=slides.length)return;
    var cv=renderSlide(slides[i],i,slides.length);
    dlSlide(cv,'lotelier_slide_'+String(i+1).padStart(2,'0')+'.png');
    setTimeout(function(){doNext(i+1)},800);
  };
  doNext(0);
};

var parseRSS=function(xml,src){
  try{
    if(!xml||xml.length<50)return{source:src.name,items:[],error:true};
    var doc=new DOMParser().parseFromString(xml,'text/xml');
    var rawItems=doc.querySelectorAll('item');
    if(!rawItems||rawItems.length===0){
      // Try Atom format
      rawItems=doc.querySelectorAll('entry');
    }
    var items=Array.from(rawItems).slice(0,6).map(function(item){
      var title=(item.querySelector('title')&&item.querySelector('title').textContent||'').trim();
      var desc=(item.querySelector('description')||item.querySelector('summary')||item.querySelector('content'));
      var descText=desc?(desc.textContent||desc.innerHTML||'').replace(/<[^>]+>/g,'').trim().slice(0,220):'';
      var link=(item.querySelector('link')&&(item.querySelector('link').textContent||item.querySelector('link').getAttribute('href'))||'').trim();
      var pub=(item.querySelector('pubDate')||item.querySelector('published')||item.querySelector('updated'));
      var pubDate=pub?pub.textContent.trim():'';
      if(!title)return null;
      return{
        title:title,description:descText,link:link,pubDate:pubDate,
        source:src.name,sourceId:src.id,sourceCat:src.cat,
        id:Math.random().toString(36).slice(2,10),senal:false,tsTxt:''
      };
    }).filter(function(i){return i!==null});
    return{source:src.name,items:items,error:items.length===0};
  }catch(e){return{source:src.name,items:[],error:true}}
};

var fetchRSS=function(src){
  var tryProxy=function(idx){
    if(idx>=PROXIES.length)return Promise.resolve({source:src.name,items:[],error:true});
    return PROXIES[idx](src.url)
      .then(function(xml){
        var result=parseRSS(xml,src);
        if(result.error||result.items.length===0)return tryProxy(idx+1);
        return result;
      })
      .catch(function(){return tryProxy(idx+1)});
  };

/* ── SECURITY ── */
var hashPassword=function(pw){
  var enc=new TextEncoder().encode(pw);
  return crypto.subtle.digest('SHA-256',enc).then(function(buf){
    return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
  });
};
// Default password hash: 'lotelier2025' - user should change via Ajustes
var getStoredHash=function(){return localStorage.getItem('lo_pwhash')||'';};
var setStoredHash=function(h){localStorage.setItem('lo_pwhash',h)};
var isUnlocked=function(){return sessionStorage.getItem('lo_unlocked')==='1'};
var unlock=function(){sessionStorage.setItem('lo_unlocked','1')};

function Login(props){
  var r1=useState(''),pw=r1[0],setPw=r1[1];
  var r2=useState(false),err=r2[0],setErr=r2[1];
  var r3=useState(false),loading=r3[0],setLoading=r3[1];
  var submit=function(){
    if(!pw.trim())return;
    setLoading(true);setErr(false);
    hashPassword(pw).then(function(hash){
      var stored=getStoredHash();
      if(!stored){
        // First time - set the password
        setStoredHash(hash);unlock();props.onLogin();
      } else if(hash===stored){
        unlock();props.onLogin();
      } else {
        setErr(true);setLoading(false);setPw('');
      }
    });
  };
  var handleKey=function(ev){if(ev.key==='Enter')submit()};
  var isFirst=!getStoredHash();
  return e('div',{style:{position:'fixed',inset:0,background:'#F2EFEA',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Montserrat,sans-serif'}},
    e('div',{style:{width:360,maxWidth:'90vw'}},
      e('div',{style:{textAlign:'center',marginBottom:36}},
        e('div',{style:{fontSize:28,fontWeight:900,color:'#202C44',letterSpacing:'-0.02em',marginBottom:4}},
          "L'OTELIER ",e('em',{style:{fontWeight:500,fontStyle:'italic',color:'#6B6966'}},'diario')
        ),
        e('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'0.16em',textTransform:'uppercase',color:'#9E9B97'}},'Tourism & Lifestyle')
      ),
      e('div',{style:{background:'#fff',borderRadius:14,padding:28,boxShadow:'0 4px 32px rgba(32,44,68,0.08)'}},
        e('div',{style:{fontSize:13,fontWeight:700,color:'#202C44',marginBottom:4}},
          isFirst?'Crea tu contraseña de acceso':'Acceso privado'
        ),
        e('div',{style:{fontSize:12,color:'#9E9B97',marginBottom:20,lineHeight:1.5}},
          isFirst?'Es la primera vez. Elige una contraseña para proteger tu app.':'Introduce tu contraseña para continuar.'
        ),
        e('input',{
          type:'password',value:pw,
          onChange:function(ev){setPw(ev.target.value);setErr(false)},
          onKeyDown:handleKey,
          placeholder:isFirst?'Elige una contraseña...':'Tu contraseña...',
          autoFocus:true,
          style:{width:'100%',padding:'0 14px',height:44,border:'1.5px solid '+(err?'#E5484D':'#E4E3E0'),borderRadius:9,fontSize:14,outline:'none',background:'#F7F7F6',marginBottom:err?8:16,transition:'border .15s'}
        }),
        err?e('div',{style:{fontSize:12,color:'#E5484D',marginBottom:16,textAlign:'center'}},'Contraseña incorrecta. Inténtalo de nuevo.'):null,
        e('button',{
          onClick:submit,disabled:!pw.trim()||loading,
          style:{width:'100%',height:44,background:'#202C44',color:'#fff',border:'none',borderRadius:9,fontSize:13,fontWeight:700,cursor:(!pw.trim()||loading)?'not-allowed':'pointer',opacity:(!pw.trim()||loading)?.5:1,letterSpacing:'0.02em',transition:'all .15s'}
        },loading?'Verificando...':isFirst?'Crear contraseña':'Entrar'),
        e('div',{style:{marginTop:20,paddingTop:16,borderTop:'1px solid #F0EFED',fontSize:11,color:'#C8C6C2',textAlign:'center',lineHeight:1.6}},'Solo tú puedes acceder. La contraseña se guarda encriptada en este dispositivo.')
      ),
      e('div',{style:{textAlign:'center',marginTop:20,fontSize:10,color:'#C8C6C2',letterSpacing:'0.08em',textTransform:'uppercase'}},'Powered by Anthropic Claude')
    )
  );
}

/* ── APP ROOT ── */
function App(){
  var r0=useState(isUnlocked()),loggedIn=r0[0],setLoggedIn=r0[1];
  var r1=useState('home'),act=r1[0],setAct=r1[1];
  var r2=useState(null),pre=r2[0],setPre=r2[1];
  var r3=useState(S.key()),apiKey=r3[0],setApiKey=r3[1];
  var r4=useState(false),modal=r4[0],setModal=r4[1];
  var r5=useState(S.pieces()),pieces=r5[0],setPieces=r5[1];
  var r6=useState(null),pfe=r6[0],setPfe=r6[1];
  var go=function(screen){setAct(screen);if(screen!=='nueva')setPre(null)};
  var onSaved=function(){setPieces(S.pieces())};
  var onUpdate=function(p){S.save(p);setPieces(S.pieces());if(pfe&&pfe.id===p.id)setPfe(p)};
  var onDelete=function(id){S.del(id);setPieces(S.pieces())};
  var onApiSave=function(k){setApiKey(k);setModal(false)};
  var screen;
  if(act==='home')screen=e(Home,{go:go,setPre:setPre,pieces:pieces});
  else if(act==='briefing')screen=e(Briefing,{go:go,setPre:setPre,apiKey:apiKey,setModal:setModal});
  else if(act==='nueva')screen=e(Nueva,{pre:pre,go:go,apiKey:apiKey,setModal:setModal,onSaved:onSaved,setPFE:setPfe});
  else if(act==='biblioteca')screen=e(Biblioteca,{pieces:pieces,go:go,onDelete:onDelete,setPFE:setPfe});
  else if(act==='editor')screen=e(Editor,{piece:pfe,go:go,onUpdate:onUpdate});
  else if(act==='publicacion')screen=e(Publicacion,{pieces:pieces,apiKey:apiKey,setModal:setModal});
  else if(act==='ajustes')screen=e(Ajustes,{apiKey:apiKey,setModal:setModal});
  else screen=e(Home,{go:go,setPre:setPre,pieces:pieces});
  if(!loggedIn)return e(Login,{onLogin:function(){setLoggedIn(true)}});
  return e('div',null,
    modal?e(ApiModal,{onSave:onApiSave,onClose:function(){setModal(false)},cur:apiKey}):null,
    e('div',{style:{display:'flex',minHeight:'100vh',background:'#F7F7F6'}},
      e(Sidebar,{act:act,go:go,apiKey:apiKey,setModal:setModal,pieces:pieces}),
      screen
    )
  );
}

pb.style.width='100%';

},150);
