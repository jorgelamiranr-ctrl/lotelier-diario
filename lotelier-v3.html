/* --- STORAGE --- */
var S = {
  key: function() { try { return localStorage.getItem('lo_key') || '' } catch(x) { return '' } },
  setKey: function(k) { try { localStorage.setItem('lo_key', k) } catch(x) {} },
  pieces: function() { try { return JSON.parse(localStorage.getItem('lo_pieces') || '[]') } catch(x) { return [] } },
  save: function(p) {
    var ps = S.pieces();
    var i = ps.findIndex(function(x) { return x.id === p.id });
    if (i >= 0) ps[i] = p; else ps.unshift(p);
    try { localStorage.setItem('lo_pieces', JSON.stringify(ps)) } catch(x) {}
  },
  del: function(id) {
    try { localStorage.setItem('lo_pieces', JSON.stringify(S.pieces().filter(function(p) { return p.id !== id }))) } catch(x) {}
  },
  prefs: function() { try { return JSON.parse(localStorage.getItem('lo_prefs') || '{"tono":"ironico","intensidad":5}') } catch(x) { return {tono:'ironico',intensidad:5} } },
  setPrefs: function(p) { try { localStorage.setItem('lo_prefs', JSON.stringify(p)) } catch(x) {} },
  briefing: function() { try { var d = JSON.parse(localStorage.getItem('lo_briefing') || 'null'); if (!d) return null; if ((Date.now() - d.ts) / 3600000 > 6) return null; return d } catch(x) { return null } },
  saveBriefing: function(d) { try { localStorage.setItem('lo_briefing', JSON.stringify({items: d, ts: Date.now()})) } catch(x) {} }
};

/* --- API --- */
var callClaude = function(k, sys, user, onStream) {
  return fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': k,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 2000,
      stream: !!onStream,
      system: sys,
      messages: [{ role: 'user', content: user }]
    })
  }).then(function(r) {
    if (!r.ok) return r.json().then(function(e) { throw new Error(e.error && e.error.message || 'Error API') });
    if (onStream) {
      var rd = r.body.getReader(), dc = new TextDecoder(), full = '';
      var read = function() {
        return rd.read().then(function(x) {
          if (x.done) return full;
          var lines = dc.decode(x.value).split('\n').filter(function(l) { return l.startsWith('data: ') });
          lines.forEach(function(l) {
            try { var d = JSON.parse(l.slice(6)); if (d.delta && d.delta.text) { full += d.delta.text; onStream(full) } } catch(e) {}
          });
          return read();
        });
      };
      return read();
    }
    return r.json().then(function(d) { return d.content[0].text });
  });
};

var SYS = "Eres el motor editorial de LOTELIER DIARIO. Voz ironica, canalla, directa. SOLO JSON valido sin markdown ni backticks.";

/* --- RSS --- */
var RSS_KEY = 'r5lnkpqr4qbcnykfsifl0ofd7jiwcl5f2nj0aumz';
var FUENTES = [
  {name:'Hosteltur', url:'https://www.hosteltur.com/rss-hosteltur', local:false},
  {name:'Preferente', url:'https://www.preferente.com/feed', local:false},
  {name:'Tourinews', url:'https://www.tourinews.es/feed', local:false},
  {name:'Skift', url:'https://skift.com/feed', local:false},
  {name:'Phocuswire', url:'https://www.phocuswire.com/rss', local:false},
  {name:'TTG Media', url:'https://www.ttgmedia.com/rss.xml', local:false},
  {name:'Europa Press', url:'https://www.europapress.es/rss/rss.aspx?ch=00071', local:false},
  {name:'Valencia Plaza', url:'https://valenciaplaza.com/feed', local:true},
  {name:'Levante-EMV', url:'https://www.levante-emv.com/rss/2.0/', local:true},
  {name:'Las Provincias', url:'https://www.lasprovincias.es/rss/2.0/', local:true}
];

var fetchFuente = function(f) {
  var url = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(f.url) + '&count=5&api_key=' + RSS_KEY;
  return fetch(url, {signal: AbortSignal.timeout(10000)})
    .then(function(r) { return r.json() })
    .then(function(d) {
      if (!d.items || !d.items.length) return [];
      return d.items.map(function(item) {
        return {
          id: Math.random().toString(36).slice(2, 10),
          title: (item.title || '').trim(),
          description: (item.description || '').replace(/<[^>]+>/g, '').trim().slice(0, 200),
          link: item.link || '',
          pubDate: item.pubDate || '',
          source: f.name,
          local: f.local
        };
      }).filter(function(i) { return i.title.length > 10 });
    })
    .catch(function() { return [] });
};

/* --- API KEY MODAL --- */
function ApiModal(props) {
  var s1 = useState(props.cur || ''), k = s1[0], setK = s1[1];
  var s2 = useState(false), testing = s2[0], setTesting = s2[1];

  return e('div', {style:{position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:999}},

      e('input', {

        onChange: function(ev) { setK(ev.target.value); setRes(null); },

        style:{width:'100%', padding:'0 12px', height:40, border:'1px solid #E4E3E0', borderRadius:8, fontSize:13, outline:'none', background:'#F7F7F6', fontFamily:'monospace', marginBottom:10}
      }),
      e('div', {style:{background:'#F0EFED', borderRadius:8, padding:'8px 11px', marginBottom:12, fontSize:11, color:'#6B6966', lineHeight:1.5}},
        'Sin key: console.anthropic.com -> Sign up -> API Keys -> Create'),
      res === 'ok' ? e('div', {style:{background:'#EBF7F2', borderRadius:8, padding:'8px 11px', marginBottom:10, fontSize:12, fontWeight:600, color:'#1E6B43'}}, 'Conexion correcta') : null,
      res === 'err' ? e('div', {style:{background:'#FEE2E2', borderRadius:8, padding:'8px 11px', marginBottom:10, fontSize:12, fontWeight:600, color:'#B91C1C'}}, 'API key incorrecta o sin creditos') : null,
      e('div', {style:{display:'flex', gap:8}},

        Btn({ch:testing ? 'Probando...' : 'Probar', v:'sec', sz:'md', onClick:test, ld:testing, full:true}),
        Btn({ch:'Guardar', v:'pri', sz:'md', onClick:function() { S.setKey(k); props.onSave(k); }, dis:!k, full:true})
      )
    )
  );
}

/* --- BRIEFING --- */
function Briefing(props) {
  var s1 = useState('idle'), state = s1[0], setState = s1[1];
  var s2 = useState([]), items = s2[0], setItems = s2[1];
  var s3 = useState({done:0,total:FUENTES.length}), prog = s3[0], setProg = s3[1];
  var s4 = useState('all'), filter = s4[0], setFilter = s4[1];
  var s5 = useState(''), manualText = s5[0], setManualText = s5[1];
  var s6 = useState(false), procesando = s6[0], setProcesando = s6[1];

  useEffect(function() {
    var c = S.briefing();
    if (c && c.length > 0) { setItems(c); setState('done'); }
  }, []);

  var cargarRSS = function() {
    setState('loading'); setProg({done:0, total:FUENTES.length});
    var todos = [];
    var runBatch = function(bi) {
      if (bi >= FUENTES.length) {
        var seen = new Set();
        var deduped = todos.filter(function(item) {
          var k = item.title.toLowerCase().slice(0, 50);
          if (seen.has(k)) return false; seen.add(k); return true;
        });
        deduped.sort(function(a, b) { try { return new Date(b.pubDate) - new Date(a.pubDate) } catch(x) { return 0 } });
        S.saveBriefing(deduped);
        setItems(deduped); setState('done'); return;
      }
      var batch = FUENTES.slice(bi, bi + 3);
      Promise.all(batch.map(fetchFuente)).then(function(results) {
        results.forEach(function(r) { todos = todos.concat(r); });
        setProg({done: Math.min(bi + 3, FUENTES.length), total: FUENTES.length});
        runBatch(bi + 3);
      });
    };
    runBatch(0);
  };

  var cargarClaude = function() {
    if (!props.apiKey) { props.setModal(true); return; }
    setState('loading'); setProg({done:0, total:1});
    var prompt = 'Genera un briefing con 12 noticias relevantes de hoy sobre turismo y hosteleria en Espana, con foco en Valencia. Datos concretos. Angulo ironico y directo.\nJSON: {"items":[{"title":"titular directo","description":"2 frases con dato clave","source":"medio del sector","local":false}]}';
    callClaude(props.apiKey, SYS, prompt)
      .then(function(raw) {
        var clean = raw.replace(/```[a-z]*\n?|\n?```/g, '').trim();
        var parsed = JSON.parse(clean);
        var noticias = (parsed.items || []).map(function(n, i) {
          return {id:'c'+i, title:n.title, description:n.description, source:n.source||'Hosteltur', local:n.local||false, link:'', pubDate:new Date().toISOString()};
        });
        S.saveBriefing(noticias); setItems(noticias); setState('done');
      })
      .catch(function() { setState('error'); });
  };

  var procesarManual = function() {
    if (!manualText.trim()) return;
    if (!props.apiKey) { props.setModal(true); return; }
    setProcesando(true);
    var prompt = 'Extrae y estructura las noticias de este texto. JSON: {"items":[{"title":"titular editorial","description":"resumen 2 frases","source":"fuente si se menciona","local":false}]}\nTexto:\n' + manualText.slice(0, 3000);
    callClaude(props.apiKey, SYS, prompt)
      .then(function(raw) {
        var clean = raw.replace(/```[a-z]*\n?|\n?```/g, '').trim();
        var parsed = JSON.parse(clean);
        var nuevas = (parsed.items || []).map(function(n, i) {
          return {id:'m'+Date.now()+i, title:n.title, description:n.description, source:n.source||'Manual', local:n.local||false, link:'', pubDate:new Date().toISOString()};
        });
        var combined = nuevas.concat(items);
        S.saveBriefing(combined); setItems(combined); setManualText(''); setProcesando(false);
      })
      .catch(function() { setProcesando(false); });
  };

  var filtered = filter === 'all' ? items : filter === 'local' ? items.filter(function(i){return i.local}) : items;

  return e('div', {style:{flex:1, overflow:'auto'}},
    Top('Briefing diario', e('div', {style:{display:'flex', gap:8, alignItems:'center'}},
      state === 'done' ? e('span', {style:{fontSize:11, color:'#9E9B97'}}, items.length + ' noticias') : null,
      state === 'loading' && prog.total > 1 ? e('span', {style:{fontSize:11, color:'#3FB378', fontWeight:600}}, prog.done + '/' + prog.total + '...') : null,
      Btn({ch: state==='loading' ? 'Cargando...' : 'RSS', v:'pri', sz:'sm', ld:state==='loading', onClick:cargarRSS}),
      Btn({ch:'Claude', v:'sec', sz:'sm', dis:state==='loading'||!props.apiKey, onClick:cargarClaude})
    )),
    e('div', {style:{padding:'20px 26px', display:'flex', flexDirection:'column', gap:16}},
      e('div', {style:{background:'#fff', border:'1px solid #E4E3E0', borderRadius:12, overflow:'hidden'}},
        e('div', {style:{padding:'11px 16px', borderBottom:'1px solid #E4E3E0', display:'flex', alignItems:'center', justifyContent:'space-between'}},
          e('span', {style:{fontSize:13, fontWeight:700}}, 'Anadir noticia manual'),
          e('span', {style:{fontSize:11, color:'#9E9B97'}}, 'Pega cualquier texto y Claude lo procesa')
        ),
        e('div', {style:{padding:'13px 16px', display:'flex', gap:10, alignItems:'flex-start'}},
          e('textarea', {
            value: manualText,
            onChange: function(ev) { setManualText(ev.target.value); },
            placeholder: 'Pega aqui el texto de cualquier noticia...',
            style:{flex:1, minHeight:70, padding:'9px 12px', border:'1px solid #E4E3E0', borderRadius:8, fontSize:13, lineHeight:1.5, resize:'vertical', outline:'none', background:'#F0EFED'}
          }),
          Btn({ch:procesando?'Procesando...':'Anadir', v:'navy', sz:'sm', ld:procesando, dis:!manualText.trim()||procesando, onClick:procesarManual})
        )

      ),
      e('div', {style:{background:'#fff', border:'1px solid #E4E3E0', borderRadius:12, overflow:'hidden', marginBottom:18}},
        e('div', {style:{padding:'11px 16px', borderBottom:'1px solid #E4E3E0', background:'#202C44'}}, e('span', {style:{fontSize:13, fontWeight:700, color:'#fff'}}, 'Preferencias editoriales')),
        e('div', {style:{padding:'16px'}},
          e('div', {style:{marginBottom:16}},
            e('label', {style:{display:'block', fontSize:10, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:'#9E9B97', marginBottom:8}}, 'INTENSIDAD ' + prefs.intensidad + '/5'),
            e('div', {style:{display:'flex', gap:6}},
              [1,2,3,4,5].map(function(n) {
                return e('div', {key:n, onClick:function(){upd('intensidad',n);}, style:{flex:1, height:10, borderRadius:4, background:n<=prefs.intensidad?'#3FB378':'#E4E3E0', cursor:'pointer'}});
              })
            )
          )
        )
      ),
      Btn({ch:'Guardar preferencias', v:'pri', sz:'lg', full:true, onClick:save})
    )
  );
}

/* --- APP --- */
function App() {
  var s1 = useState('home'), act = s1[0], setAct = s1[1];
  var s2 = useState(null), pre = s2[0], setPre = s2[1];
  var s3 = useState(S.key()), apiKey = s3[0], setApiKey = s3[1];
  var s4 = useState(false), modal = s4[0], setModal = s4[1];
  var s5 = useState(S.pieces()), pieces = s5[0], setPieces = s5[1];

  var go = function(screen) { setAct(screen); if (screen !== 'nueva') setPre(null); };
  var onSaved = function() { setPieces(S.pieces()); };
  var onDelete = function(id) { S.del(id); setPieces(S.pieces()); };
  var onApiSave = function(k) { setApiKey(k); setModal(false); };

  var screen;
  if (act === 'home') screen = e(Home, {go:go, setPre:setPre, pieces:pieces});
  else if (act === 'briefing') screen = e(Briefing, {go:go, setPre:setPre, apiKey:apiKey, setModal:setModal});
  else if (act === 'nueva') screen = e(Nueva, {pre:pre, go:go, apiKey:apiKey, setModal:setModal, onSaved:onSaved});
  else if (act === 'biblioteca') screen = e(Biblioteca, {pieces:pieces, go:go, onDelete:onDelete});
  else if (act === 'ajustes') screen = e(Ajustes, {apiKey:apiKey, setModal:setModal});
  else screen = e(Home, {go:go, setPre:setPre, pieces:pieces});

  return e('div', null,
    modal ? e(ApiModal, {onSave:onApiSave, onClose:function(){setModal(false);}, cur:apiKey}) : null,
    e('div', {style:{display:'flex', minHeight:'100vh', background:'#F7F7F6'}},
      e(Sidebar, {act:act, go:go, apiKey:apiKey, setModal:setModal, pieces:pieces}),
      screen
    )
  );
}

/* --- BOOT --- */
ReactDOM.createRoot(document.getElementById('root')).render(e(App, null));

})();
</script>
</body>
</html>
