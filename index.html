  briefing: function() { try{var d=JSON.parse(localStorage.getItem('lo_briefing')||'null');if(!d)return null;if((Date.now()-d.ts)/3600000>6)return null;return d.items}catch(x){return null} },

/* API */
var callClaude = function(k, sys, user, onStream) {
  return fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-opus-4-5',max_tokens:2000,stream:!!onStream,system:sys,messages:[{role:'user',content:user}]})
  }).then(function(r) {
    if(!r.ok) return r.json().then(function(e){throw new Error(e.error&&e.error.message||'Error API')});
    if(onStream) {
      var rd=r.body.getReader(),dc=new TextDecoder(),full='';
      var read=function(){return rd.read().then(function(x){
        if(x.done)return full;
        dc.decode(x.value).split('\n').filter(function(l){return l.startsWith('data: ')}).forEach(function(l){
          try{var d=JSON.parse(l.slice(6));if(d.delta&&d.delta.text){full+=d.delta.text;onStream(full)}}catch(e){}
        });
        return read();
      })};
      return read();
    }
    return r.json().then(function(d){return d.content[0].text});
  });
};

/* BRIEFING */
function Briefing(props) {
  var s1=useState('idle'),state=s1[0],setState=s1[1];
  var s2=useState([]),items=s2[0],setItems=s2[1];
  var s3=useState({done:0,total:10}),prog=s3[0],setProg=s3[1];
  var s4=useState('all'),filter=s4[0],setFilter=s4[1];
  var s5=useState(''),manualText=s5[0],setManualText=s5[1];
  var s6=useState(false),procesando=s6[0],setProcesando=s6[1];
  var s7=useState(''),procErr=s7[0],setProcErr=s7[1];

  useEffect(function(){var c=S.briefing();if(c&&c.length>0){setItems(c);setState('done')}},[]);

  var FUENTES=[
    {name:'Hosteltur',url:'https://www.hosteltur.com/rss-hosteltur',local:false},
    {name:'Preferente',url:'https://www.preferente.com/feed',local:false},
    {name:'Tourinews',url:'https://www.tourinews.es/feed',local:false},
    {name:'Skift',url:'https://skift.com/feed',local:false},
    {name:'Phocuswire',url:'https://www.phocuswire.com/rss',local:false},
    {name:'TTG Media',url:'https://www.ttgmedia.com/rss.xml',local:false},
    {name:'Europa Press',url:'https://www.europapress.es/rss/rss.aspx?ch=00071',local:false},
    {name:'Valencia Plaza',url:'https://valenciaplaza.com/feed',local:true},
    {name:'Levante-EMV',url:'https://www.levante-emv.com/rss/2.0/',local:true},
    {name:'Las Provincias',url:'https://www.lasprovincias.es/rss/2.0/',local:true}
  ];
  var RSS_KEY='r5lnkpqr4qbcnykfsifl0ofd7jiwcl5f2nj0aumz';

  var cargarRSS=function(){
    setState('loading');setProg({done:0,total:FUENTES.length});
    var todos=[];
    var hoy=new Date();hoy.setHours(0,0,0,0);
    var runBatch=function(bi){
      if(bi>=FUENTES.length){
        var seen=new Set();
        var deduped=todos.filter(function(item){
          var k=item.title.toLowerCase().slice(0,50);
          if(seen.has(k))return false;seen.add(k);return true;
        });
        /* Sort by date newest first */
        deduped.sort(function(a,b){try{return new Date(b.pubDate)-new Date(a.pubDate)}catch(x){return 0}});
        S.saveBriefing(deduped);setItems(deduped);setState(deduped.length>0?'done':'error');return;
      }
      var batch=FUENTES.slice(bi,bi+3);
      Promise.all(batch.map(function(f){
        var url='https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(f.url)+'&count=8&api_key='+RSS_KEY;
        return fetch(url,{signal:AbortSignal.timeout(12000)})
          .then(function(r){return r.json()})
          .then(function(d){
            if(!d.items||!d.items.length)return[];
            return d.items.map(function(item){
              return{id:Math.random().toString(36).slice(2,10),title:(item.title||'').trim(),description:(item.description||'').replace(/<[^>]+>/g,'').trim().slice(0,220),link:item.link||'',pubDate:item.pubDate||'',source:f.name,local:f.local};
            }).filter(function(i){return i.title.length>10});
          })
          .catch(function(){return[]});
      })).then(function(results){
        results.forEach(function(r){todos=todos.concat(r)});
        setProg({done:Math.min(bi+3,FUENTES.length),total:FUENTES.length});
        runBatch(bi+3);
      });
    };
    runBatch(0);
  };

  var cargarClaude=function(){
    if(!props.apiKey){props.setModal(true);return}
    setState('loading');setProg({done:0,total:1});
    var hoy=new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    var prompt='Hoy es '+hoy+'. Genera un briefing editorial con 12 noticias REALES y ACTUALES de turismo y hosteleria publicadas HOY o esta semana.\n\nTemas: hoteles, aerolineas, restauracion, turismo espanol, turismo internacional, economia turistica, tecnologia hotelera, turismo Valencia.\n\nNO inventes noticias. Usa hechos y tendencias reales que conoces del sector. Datos concretos. Titulares directos e ironicos estilo LOTELIER DIARIO.\n\nJSON sin markdown:\n{"items":[{"title":"titular directo con dato concreto","description":"2 frases con el dato clave y contexto","source":"nombre del medio especializado real","local":false}]}';
    callClaude(props.apiKey,SYS_ANALISIS,prompt)
      .then(function(raw){
        var clean=raw.replace(/```[a-z]*\n?|\n?```/g,'').trim();
        var parsed=JSON.parse(clean);
        var noticias=(parsed.items||[]).map(function(n,i){return{id:'c'+i,title:n.title,description:n.description,source:n.source||'Hosteltur',local:n.local||false,link:'',pubDate:new Date().toISOString()}});
        S.saveBriefing(noticias);setItems(noticias);setState('done');
      })
      .catch(function(e){setState('error');console.error(e)});
  };

  var procesarManual=function(){
    if(!manualText.trim())return;
    if(!props.apiKey){props.setModal(true);return}
    setProcesando(true);setProcErr('');
    var prompt='Extrae y estructura las noticias de turismo y hosteleria de este texto. Solo incluye noticias relevantes para el sector.\nJSON sin markdown:\n{"items":[{"title":"titular editorial directo","description":"resumen 2 frases con datos","source":"fuente si se menciona o Manual","local":false}]}\nTexto:\n'+manualText.slice(0,3000);
    callClaude(props.apiKey,SYS_ANALISIS,prompt)
      .then(function(raw){
        var clean=raw.replace(/```[a-z]*\n?|\n?```/g,'').trim();
        var parsed=JSON.parse(clean);

/* EDITOR ROUTER */

/* APP */
function App() {
  var s1=useState('home'),act=s1[0],setAct=s1[1];
  var s2=useState(null),pre=s2[0],setPre=s2[1];
  var s3=useState(S.key()),apiKey=s3[0],setApiKey=s3[1];
  var s4=useState(false),modal=s4[0],setModal=s4[1];
  var s5=useState(S.pieces()),pieces=s5[0],setPieces=s5[1];
  var s6=useState(null),pfe=s6[0],setPfe=s6[1];

  var go=function(screen){setAct(screen);if(screen!=='nueva')setPre(null)};
  var onSaved=function(){setPieces(S.pieces())};
  var onUpdate=function(p){S.save(p);setPieces(S.pieces());if(pfe&&pfe.id===p.id)setPfe(p)};
  var onDelete=function(id){S.del(id);setPieces(S.pieces())};
  var onApiSave=function(k){setApiKey(k);setModal(false)};

  var screen;
  if(act==='home') screen=e(Home,{go:go,setPre:setPre,pieces:pieces,setPFE:setPfe});
  else if(act==='briefing') screen=e(Briefing,{go:go,setPre:setPre,apiKey:apiKey,setModal:setModal});
  else if(act==='nueva') screen=e(Nueva,{pre:pre,go:go,apiKey:apiKey,setModal:setModal,onSaved:onSaved});
  else if(act==='biblioteca') screen=e(Biblioteca,{pieces:pieces,go:go,onDelete:onDelete,setPFE:setPfe});
  else if(act==='editor') screen=e(Editor,{piece:pfe,go:go,onUpdate:onUpdate});
  else if(act==='ajustes') screen=e(Ajustes,{apiKey:apiKey,setModal:setModal});
  else screen=e(Home,{go:go,setPre:setPre,pieces:pieces,setPFE:setPfe});

  return e('div',null,
    modal?e(ApiModal,{onSave:onApiSave,onClose:function(){setModal(false)},cur:apiKey}):null,
    e('div',{style:{display:'flex',minHeight:'100vh',background:'#F7F7F6'}},
      e(Sidebar,{act:act,go:go,apiKey:apiKey,setModal:setModal,pieces:pieces}),
      screen
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));

})();
