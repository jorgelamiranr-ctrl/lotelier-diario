/* STORAGE */
var S={
  key:function(){try{return localStorage.getItem('lo_key')||''}catch(x){return''}},
  setKey:function(k){try{localStorage.setItem('lo_key',k)}catch(x){}},
  pieces:function(){try{return JSON.parse(localStorage.getItem('lo_pieces')||'[]')}catch(x){return[]}},
  save:function(p){var ps=S.pieces(),i=ps.findIndex(function(x){return x.id===p.id});if(i>=0)ps[i]=p;else ps.unshift(p);try{localStorage.setItem('lo_pieces',JSON.stringify(ps))}catch(x){}},
  del:function(id){try{localStorage.setItem('lo_pieces',JSON.stringify(S.pieces().filter(function(p){return p.id!==id})))}catch(x){}},
  briefing:function(){try{var d=JSON.parse(localStorage.getItem('lo_briefing')||'null');if(!d)return null;if((Date.now()-d.ts)/3600000>8)return null;return d.items}catch(x){return null}},
  saveBriefing:function(d){try{localStorage.setItem('lo_briefing',JSON.stringify({items:d,ts:Date.now()}))}catch(x){}}
};

/* API CLAUDE */
var callClaude=function(k,sys,user,onStream){
  return fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-opus-4-5',max_tokens:2000,stream:!!onStream,system:sys,messages:[{role:'user',content:user}]})
  }).then(function(r){
    if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message||'Error API')});
    if(onStream){
      var rd=r.body.getReader(),dc=new TextDecoder(),full='';
      var read=function(){return rd.read().then(function(x){
        if(x.done)return full;
        dc.decode(x.value).split('\n').filter(function(l){return l.startsWith('data: ')}).forEach(function(l){
          try{var d=JSON.parse(l.slice(6));if(d.delta&&d.delta.text){full+=d.delta.text;onStream(full)}}catch(e){}
        });
        return read();
      })};
      return read();
    }
    return r.json().then(function(d){return d.content[0].text});
  });
};

var esTurismo=function(title,desc){
  var text=(title+' '+(desc||'')).toLowerCase();
  return TOURISM_KEYWORDS.some(function(kw){return text.includes(kw)});
};

var fetchFuente=function(f){
  var url='https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(f.url)+'&count=8&api_key='+RSS_KEY;
  return fetch(url,{signal:AbortSignal.timeout(12000)})
    .then(function(r){return r.json()})
    .then(function(d){
      if(!d.items||!d.items.length)return[];
      return d.items.map(function(item){
        return{
          id:Math.random().toString(36).slice(2,10),
          title:(item.title||'').trim(),
          description:(item.description||'').replace(/<[^>]+>/g,'').trim().slice(0,220),
          link:item.link||'',pubDate:item.pubDate||'',
          source:f.name,local:f.local,cat:f.cat
        };
      }).filter(function(i){
        if(i.title.length<10)return false;
        if(f.filtrarTurismo)return esTurismo(i.title,i.description);
        return true;
      });
    })
    .catch(function(){return[]});
};

/* CANVAS RENDER - Magazine style */
var wrapText=function(ctx,text,x,y,maxW,lineH,maxLines){
  if(!text)return y;
  var words=text.split(' '),line='',lines=[],cy=y;
  for(var i=0;i<words.length;i++){
    var word=words[i];
    /* If a single word overflows, shrink font temporarily or force break */
    var test=line?line+' '+word:word;
    if(ctx.measureText(test).width>maxW&&line){
      lines.push(line);line=word;
      if(maxLines&&lines.length>=maxLines){lines[lines.length-1]+='...';break}
    } else line=test;
  }
  if(line&&(!maxLines||lines.length<maxLines))lines.push(line);
  lines.forEach(function(l){
    /* Clip line to maxW using fillText with clipping rect */
    ctx.save();
    ctx.beginPath();ctx.rect(x,cy-lineH,maxW,lineH+10);ctx.clip();
    ctx.fillText(l,x,cy);
    ctx.restore();
    cy+=lineH;
  });
  return cy;
};

/* Scale font to fit text in one line */
var fitText=function(ctx,text,x,y,maxW,maxSize,minSize){
  var size=maxSize;
  ctx.font=ctx.font.replace(/\d+px/,size+'px');
  while(ctx.measureText(text).width>maxW&&size>minSize){
    size-=4;
    ctx.font=ctx.font.replace(/\d+px/,size+'px');
  }
  ctx.fillText(text,x,y);
  return size;
};

var addGrain=function(ctx,W,H,intensity){
  intensity=intensity||20;
  var d=ctx.getImageData(0,0,W,H),px=d.data;
  for(var i=0;i<px.length;i+=4){
    var n=(Math.random()-0.5)*intensity*2;
    px[i]=Math.max(0,Math.min(255,px[i]+n));
    px[i+1]=Math.max(0,Math.min(255,px[i+1]+n));
    px[i+2]=Math.max(0,Math.min(255,px[i+2]+n));
  }
  ctx.putImageData(d,0,0);
};

      var dw=bgImg.width*ratio,dh=bgImg.height*ratio;
      ctx.drawImage(bgImg,(W-dw)/2,(H-dh)/2,dw,dh);
      /* Dark overlay */
      ctx.fillStyle='rgba(10,15,30,0.62)';ctx.fillRect(0,0,W,H);

  var cargarRSS=function(){
    setState('loading');setProg({done:0,total:FUENTES.length});
    var todos=[];
    var runBatch=function(bi){
      if(bi>=FUENTES.length){
        var seen=new Set();
        var deduped=todos.filter(function(item){
          var k=item.title.toLowerCase().slice(0,50);
          if(seen.has(k))return false;seen.add(k);return true;
        });
        deduped.sort(function(a,b){try{return new Date(b.pubDate)-new Date(a.pubDate)}catch(x){return 0}});
        S.saveBriefing(deduped);setItems(deduped);setState(deduped.length>0?'done':'error');return;
      }
      var batch=FUENTES.slice(bi,bi+3);
      Promise.all(batch.map(fetchFuente)).then(function(results){
        results.forEach(function(r){todos=todos.concat(r)});
        setProg({done:Math.min(bi+3,FUENTES.length),total:FUENTES.length});
        runBatch(bi+3);

    };

function EdVideo(p){

  var loadVideoBg=function(ev){
    var file=ev.target.files&&ev.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e2){var img=new Image();img.onload=function(){setVideoBgImg(img)};img.src=e2.target.result};
    reader.readAsDataURL(file);
  };

  var upd=function(i,f,v){var nb=bloques.slice();nb[i]=Object.assign({},nb[i]);nb[i][f]=v;setBloques(nb);setSaved(false)};
  var save=function(){var np=Object.assign({},p.piece,{content:Object.assign({},p.piece.content,{bloques:bloques,copy_caption:cap}),status:'ready'});S.save(np);p.onUpdate(np);setSaved(true);setTimeout(function(){setSaved(false)},2000)};

  var renderReelFrame=function(bl,idx,total,bgImg,titleOverride){
    var W=1080,H=1920,P=80;
    var cv=document.createElement('canvas');cv.width=W;cv.height=H;
    var ctx=cv.getContext('2d');
    /* Background */
    if(bgImg){
      var ratio=Math.max(W/bgImg.width,H/bgImg.height);
      var dw=bgImg.width*ratio,dh=bgImg.height*ratio;
      ctx.drawImage(bgImg,(W-dw)/2,(H-dh)/2,dw,dh);
    } else {
      /* Dark gradient BG */
      var gr0=ctx.createLinearGradient(0,0,W,H);
      gr0.addColorStop(0,'#0d1520');gr0.addColorStop(0.5,'#1a2535');gr0.addColorStop(1,'#0a0f1a');
      ctx.fillStyle=gr0;ctx.fillRect(0,0,W,H);
    }
    /* Overlay gradient */
    var gr=ctx.createLinearGradient(0,0,0,H);
    gr.addColorStop(0,'rgba(0,0,0,0.55)');
    gr.addColorStop(0.35,'rgba(0,0,0,0.15)');
    gr.addColorStop(0.7,'rgba(0,0,0,0.2)');
    gr.addColorStop(1,'rgba(0,0,0,0.8)');
    ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
    /* Grain */
    addGrain(ctx,W,H,16);
    /* Header bar */
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,0,W,110);
    ctx.font='800 32px AgrandirGrandHeavy,Impact,Arial';ctx.fillStyle='#fff';
    ctx.fillText('LOTELIER',P,72);
    ctx.font='300 28px AgrandirGrandLight,Arial';ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText(' diario',P+ctx.measureText('LOTELIER').width+4,72);
    ctx.font='700 22px Montserrat,Arial';ctx.fillStyle='#3FB378';ctx.textAlign='right';
    ctx.fillText('REEL '+String(idx+1).padStart(2,'0')+'.',W-P,48);
    ctx.font='400 18px Montserrat,Arial';ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.fillText(String(idx+1).padStart(2,'0')+'/'+String(total).padStart(2,'0'),W-P,72);
    ctx.textAlign='left';
    /* Green accent line */
    ctx.fillStyle='#3FB378';ctx.fillRect(P,140,6,56);
    /* Tipo label */
    ctx.font='700 24px Montserrat,Arial';ctx.fillStyle='#3FB378';
    ctx.fillText((bl.tipo||'').toUpperCase(),P+20,178);
    /* MAIN COPY - big editorial text */
    var copy=bl.copy||'';
    var isIntro=bl.tipo==='intro';
    var isDato=bl.tipo==='dato';
    var bigSize=isDato?200:isIntro?140:120;
    ctx.font='900 '+bigSize+'px AgrandirGrandHeavy,Impact,Arial Black';
    ctx.fillStyle='#fff';
    /* Wrap copy with proper constraints */
    var maxW=W-P*2;
    var words=copy.split(' '),line='',y=420,lh=bigSize+20;
    var linesDrawn=0,maxL=6;
    for(var wi=0;wi<words.length;wi++){
      var test=line?line+' '+words[wi]:words[wi];
      if(ctx.measureText(test).width>maxW&&line){
        ctx.save();ctx.beginPath();ctx.rect(P,y-lh,maxW,lh+10);ctx.clip();
        ctx.fillText(line,P,y);ctx.restore();
        y+=lh;linesDrawn++;line=words[wi];
        if(linesDrawn>=maxL)break;
      } else line=test;
    }
    if(line&&linesDrawn<maxL){
      ctx.save();ctx.beginPath();ctx.rect(P,y-lh,maxW,lh+10);ctx.clip();
      ctx.fillText(line,P,y);ctx.restore();
    }
    /* If it's a dato tipo, add green accent number */
    if(isDato){
      /* already done via copy text above - add underline */
      ctx.fillStyle='#3FB378';ctx.fillRect(P,y+30,140,6);
    }
    /* Bottom section */
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,H-200,W,200);
    /* Duration pill */
    ctx.fillStyle='rgba(63,179,120,0.2)';ctx.beginPath();
    ctx.roundRect?ctx.roundRect(P,H-170,120,44,22):ctx.rect(P,H-170,120,44);
    ctx.fill();
    ctx.font='700 22px Montserrat,Arial';ctx.fillStyle='#3FB378';
    ctx.fillText(bl.duracion||'5s',P+16,H-140);
    /* Progress bar */
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(P,H-85,W-P*2,3);
    ctx.fillStyle='#3FB378';ctx.fillRect(P,H-85,(W-P*2)*((idx+1)/total),3);
    /* Bottom credits */
    ctx.font='600 20px Montserrat,Arial';ctx.fillStyle='rgba(255,255,255,0.25)';
    ctx.fillText('LOTELIER DIARIO  -  ORIGINAL MAGAZINE',P,H-45);
    return cv;
  };

  var exportFrames=function(){
    loadFonts().then(function(){
      var delay=0;
      bloques.forEach(function(bl,i){
        setTimeout(function(){
          var cv=renderReelFrame(bl,i,bloques.length,videoBgImg,null);
          var url=cv.toDataURL('image/png',0.96);
          dlFile(url,'lotelier_reel_'+String(i+1).padStart(2,'0')+'.png');
          /* Open first frame in new tab as preview */
          if(i===0){var w=window.open('','_blank');if(w){w.document.write('<img src="'+url+'" style="max-width:100%;display:block"><p style="font-family:sans-serif;padding:8px;color:#666">Clic derecho > Guardar imagen</p>')}}
        },delay);
        delay+=900;
      });
    });
  };
  var exportScript=function(){
    var txt='GUION VIDEO - LOTELIER DIARIO\n';
    txt+='Titular: '+(p.piece.analysis&&p.piece.analysis.titular_editorial||'')+'\n\n';
    bloques.forEach(function(b){txt+='['+b.tipo.toUpperCase()+' - '+b.duracion+']\n'+b.copy+'\n\n'});
    txt+='\nCAPTION:\n'+cap;
    var blob=new Blob([txt],{type:'text/plain'});
    var url=URL.createObjectURL(blob);
    dlFile(url,'lotelier_guion_video.txt');
    URL.revokeObjectURL(url);
  };

  var b=bloques[active]||{};
  var TC={intro:'#3FB378',contexto:'#fff',dato:'#3FB378',desarrollo:'#fff',cierre:'#3FB378'};

  return e('div',{style:{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}},
    Top('Editor Video / Reels',e('div',{style:{display:'flex',gap:7,alignItems:'center'}},
      saved?e('span',{style:{fontSize:11,fontWeight:600,color:'#3FB378'}},'Guardado'):null,
      Btn({ch:'Biblioteca',v:'sec',sz:'sm',onClick:function(){p.go('biblioteca')}}),
      Btn({ch:'Guardar',v:'sec',sz:'sm',onClick:save}),
      Btn({ch:'Exportar frames PNG',v:'pri',sz:'sm',onClick:exportFrames}),
    Btn({ch:'Guion TXT',v:'sec',sz:'sm',onClick:exportScript})
    )),
    e('div',{style:{display:'flex',flex:1,overflow:'hidden'}},
      /* Bloques panel */
      e('div',{style:{width:200,background:'#fff',borderRight:'1px solid #E4E3E0',overflow:'auto',padding:'12px'}},
        e('div',{style:{fontSize:10,fontWeight:700,color:'#9E9B97',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:10}},'Bloques del video'),
        bloques.map(function(bl,i){
          return e('div',{key:i,onClick:function(){setActive(i)},style:{marginBottom:6,padding:'10px 11px',borderRadius:8,background:active===i?'#EBF7F2':'#F0EFED',border:'1px solid '+(active===i?'#3FB378':'transparent'),cursor:'pointer'}},
            e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}},
              e('span',{style:{fontSize:10,fontWeight:700,color:active===i?'#1E6B43':'#6B6966',textTransform:'uppercase'}},'#'+(i+1)+' '+bl.tipo),
              e('span',{style:{fontSize:10,color:'#9E9B97',fontWeight:600}},bl.duracion)
            ),
            e('div',{style:{fontSize:12,lineHeight:1.35,color:active===i?'#202C44':'#6B6966',overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}},bl.copy)
          );
        })
      ),
      /* Preview */
      e('div',{style:{flex:1,background:'#111',display:'flex',alignItems:'center',justifyContent:'center',padding:'28px',position:'relative',flexDirection:'column',gap:12}},
        e('canvas',{
          ref:function(node){
            if(!node)return;
            loadFonts().then(function(){
              var cv=renderReelFrame(b,active,bloques.length,videoBgImg,null);
              node.width=300;node.height=533;
              node.getContext('2d').drawImage(cv,0,0,300,533);
            });
          },
          style:{borderRadius:8,boxShadow:'0 20px 60px rgba(0,0,0,0.6)',maxHeight:533,maxWidth:300}
        })
        e('div',{style:{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}},
          e('input',{type:'file',accept:'image/*',ref:vidFileRef,onChange:loadVideoBg,style:{display:'none'}}),
          Btn({ch:videoBgImg?'Cambiar foto BG':'Subir foto de fondo',v:'navy',sz:'sm',onClick:function(){vidFileRef.current&&vidFileRef.current.click()}}),
          videoBgImg?Btn({ch:'Quitar foto',v:'ghost',sz:'sm',onClick:function(){setVideoBgImg(null)}}):null
        )
      ),
      /* Edit panel */
      e('div',{style:{width:300,background:'#fff',borderLeft:'1px solid #E4E3E0',overflow:'auto',padding:'16px',flexShrink:0}},
        e('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'#9E9B97',marginBottom:14}},'Bloque '+(active+1)+' - '+(b.tipo||'')),
        e('div',{style:{marginBottom:12}},
          e('label',{style:{display:'block',fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'#9E9B97',marginBottom:4}},'COPY (texto en pantalla)'),
          e('textarea',{value:b.copy||'',onChange:function(ev){upd(active,'copy',ev.target.value)},rows:5,style:{width:'100%',padding:'8px 10px',border:'1px solid #E4E3E0',borderRadius:7,fontSize:13,lineHeight:1.5,resize:'vertical',outline:'none',background:'#F0EFED'}})
        ),
        e('div',{style:{marginBottom:12}},
          e('label',{style:{display:'block',fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'#9E9B97',marginBottom:4}},'DURACION'),
          e('input',{value:b.duracion||'',onChange:function(ev){upd(active,'duracion',ev.target.value)},style:{width:'100%',padding:'0 10px',height:34,border:'1px solid #E4E3E0',borderRadius:6,fontSize:12,outline:'none',background:'#F0EFED'}})
        ),
        e('div',{style:{borderTop:'1px solid #F0EFED',paddingTop:12,marginBottom:12}},
          e('label',{style:{display:'block',fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'#9E9B97',marginBottom:4}},'CAPTION PARA EL POST'),
          e('textarea',{value:cap,onChange:function(ev){setCap(ev.target.value)},rows:3,style:{width:'100%',padding:'7px 10px',border:'1px solid #E4E3E0',borderRadius:6,fontSize:12,lineHeight:1.5,resize:'vertical',outline:'none',background:'#F0EFED'}})
        ),
        e('div',{style:{display:'flex',gap:6,marginBottom:10}},
          Btn({ch:'Anterior',v:'sec',sz:'sm',full:true,dis:active===0,onClick:function(){setActive(function(a){return a-1})}}),
          Btn({ch:'Siguiente',v:'sec',sz:'sm',full:true,dis:active===bloques.length-1,onClick:function(){setActive(function(a){return a+1})}})
        ),
        Btn({ch:'Guardar cambios',v:'pri',sz:'md',full:true,onClick:save}),
        e('div',{style:{marginTop:12,padding:'10px 12px',background:'#F0EFED',borderRadius:8,fontSize:11,color:'#6B6966',lineHeight:1.6}},
          'Para descargar: pulsa "Descargar guion TXT" arriba. El guion completo se guarda como archivo de texto para tu editor de video.'
        )
      )
    )
  );
}

/* EDITOR ROUTER */
function Editor(p){
  if(!p.piece)return e('div',{style:{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}},
    e('p',{style:{fontSize:13,color:'#9E9B97'}},'Selecciona una pieza desde la biblioteca.'),
    Btn({ch:'Ir a biblioteca',v:'pri',sz:'md',onClick:function(){p.go('biblioteca')}})
  );
  if(p.piece.format==='carousel')return e(EdCarrusel,p);
  if(p.piece.format==='video')return e(EdVideo,p);
  return null;
}

/* BIBLIOTECA */
function Biblioteca(p){
  var s1=useState('all'),f=s1[0],setF=s1[1];
  var s2=useState(''),q=s2[0],setQ=s2[1];
  var filtered=p.pieces.filter(function(pc){
    if(f!=='all'&&pc.format!==f)return false;
    if(q&&!(pc.analysis&&pc.analysis.titular_editorial||'').toLowerCase().includes(q.toLowerCase()))return false;
    return true;
  });
  var FL={carousel:'Carrusel',video:'Video'};
  return e('div',{style:{flex:1,overflow:'auto'}},
    Top('Biblioteca',Btn({ch:'Nueva pieza',v:'pri',sz:'sm',onClick:function(){p.go('nueva')}})),
    e('div',{style:{padding:'20px 26px'}},
      e('div',{style:{display:'flex',gap:9,marginBottom:16,alignItems:'center'}},
        e('input',{value:q,onChange:function(ev){setQ(ev.target.value)},placeholder:'Buscar...',style:{flex:1,padding:'0 10px',height:35,border:'1px solid #E4E3E0',borderRadius:8,fontSize:13,outline:'none',background:'#F0EFED'}}),
        e('div',{style:{display:'flex',gap:5}},
          [{id:'all',l:'Todos'},{id:'carousel',l:'Carrusel'},{id:'video',l:'Video'}].map(function(fi){
            return e('button',{key:fi.id,onClick:function(){setF(fi.id)},style:{padding:'5px 10px',borderRadius:6,border:'1px solid',fontSize:11,fontWeight:600,cursor:'pointer',borderColor:f===fi.id?'#3FB378':'#E4E3E0',background:f===fi.id?'#EBF7F2':'transparent',color:f===fi.id?'#1E6B43':'#6B6966'}},fi.l);
          })
        )
      ),
      filtered.length===0?e('div',{style:{textAlign:'center',padding:'52px 0'}},
        e('p',{style:{fontSize:13,color:'#9E9B97',marginBottom:16}},p.pieces.length===0?'Sin piezas. Empieza desde el Briefing.':'Sin resultados.'),
        p.pieces.length===0?Btn({ch:'Ir al Briefing',v:'pri',sz:'md',onClick:function(){p.go('briefing')}}):null
      ):e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:14}},
        filtered.map(function(pc){
          return e('div',{key:pc.id,style:{background:'#fff',border:'1px solid #E4E3E0',borderRadius:12,overflow:'hidden'}},
            e('div',{style:{height:110,background:pc.color||'#202C44',position:'relative',cursor:'pointer'},onClick:function(){p.setPFE(pc);p.go('editor')}},
              e('div',{style:{position:'absolute',inset:0,background:'rgba(0,0,0,0.3)'}}),
              e('div',{style:{position:'absolute',bottom:10,left:12,right:12,fontFamily:'Impact,Arial Black,sans-serif',fontSize:15,fontWeight:900,color:'#fff',lineHeight:1.15,textTransform:'uppercase'}},(pc.analysis&&pc.analysis.titular_editorial||'Sin titulo').slice(0,60)),
              e('div',{style:{position:'absolute',top:10,right:10}},
                e('span',{style:{display:'inline-flex',fontSize:9,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',padding:'3px 8px',borderRadius:4,background:'#3FB378',color:'#fff'}},FL[pc.format]||pc.format)
              )
            ),
            e('div',{style:{padding:'10px 12px'}},
              e('div',{style:{fontSize:11,color:'#9E9B97',marginBottom:10}},new Date(pc.createdAt).toLocaleDateString('es-ES',{day:'numeric',month:'short'})+' - '+(pc.source||'-')),
              e('div',{style:{display:'flex',gap:7}},
                Btn({ch:'Editar',v:'pri',sz:'sm',onClick:function(){p.setPFE(pc);p.go('editor')}}),
                pc.format==='carousel'?Btn({ch:'Exportar slides',v:'sec',sz:'sm',onClick:function(){p.setPFE(pc);p.go('editor')}}):null,
                e('div',{style:{marginLeft:'auto'}},Btn({ch:'Borrar',v:'ghost',sz:'sm',onClick:function(){if(window.confirm('Borrar esta pieza?')){p.onDelete(pc.id)}}}))
              )
            )
          );
        })
      )
    )
  );
}

/* AJUSTES */
function Ajustes(p){
  return e('div',{style:{flex:1,overflow:'auto'}},
    Top('Ajustes',null),
    e('div',{style:{maxWidth:580,margin:'0 auto',padding:'26px'}},
      e('div',{style:{background:'#fff',border:'1px solid #E4E3E0',borderRadius:12,overflow:'hidden',marginBottom:18}},
        e('div',{style:{padding:'11px 16px',borderBottom:'1px solid #E4E3E0',background:'#202C44'}},e('span',{style:{fontSize:13,fontWeight:700,color:'#fff'}},'API Anthropic')),
        e('div',{style:{padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
          e('div',null,
            e('div',{style:{fontSize:13,fontWeight:600}},p.apiKey?'Motor editorial activo':'Sin API key configurada'),
            e('div',{style:{fontSize:11,color:'#9E9B97',marginTop:2}},p.apiKey?'sk-ant-...'+p.apiKey.slice(-6):'Necesitas una API key de Anthropic (console.anthropic.com)')
          ),
          Btn({ch:'Cambiar API key',v:'pri',sz:'sm',onClick:function(){p.setModal(true)}})
        )
      ),
      e('div',{style:{background:'#fff',border:'1px solid #E4E3E0',borderRadius:12,padding:'16px',marginBottom:18}},
        e('div',{style:{fontSize:13,fontWeight:700,marginBottom:8}},'Fuentes RSS activas'),
        e('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
          FUENTES.map(function(f){
            return e('div',{key:f.name,style:{fontSize:11,fontWeight:600,padding:'3px 9px',background:'#F0EFED',borderRadius:5,color:'#6B6966'}},f.name);
          })
        )
      )
    )
  );
}

/* APP */
function App(){
  var s1=useState('home'),act=s1[0],setAct=s1[1];
  var s2=useState(null),pre=s2[0],setPre=s2[1];
  var s3=useState(S.key()),apiKey=s3[0],setApiKey=s3[1];
  var s4=useState(false),modal=s4[0],setModal=s4[1];
  var s5=useState(S.pieces()),pieces=s5[0],setPieces=s5[1];
  var s6=useState(null),pfe=s6[0],setPfe=s6[1];

  var go=function(screen){setAct(screen);if(screen!=='nueva')setPre(null)};
  var onSaved=function(){setPieces(S.pieces())};
  var onUpdate=function(p2){S.save(p2);setPieces(S.pieces());if(pfe&&pfe.id===p2.id)setPfe(p2)};
  var onDelete=function(id){S.del(id);setPieces(S.pieces())};
  var onApiSave=function(k){setApiKey(k);setModal(false)};

  var screen;
  var sp={go:go,setPre:setPre,apiKey:apiKey,setModal:setModal,pieces:pieces,setPFE:setPfe};
  if(act==='home')screen=e(Home,sp);
  else if(act==='briefing')screen=e(Briefing,sp);
  else if(act==='nueva')screen=e(Nueva,Object.assign({},sp,{pre:pre,onSaved:onSaved}));
  else if(act==='biblioteca')screen=e(Biblioteca,Object.assign({},sp,{onDelete:onDelete}));
  else if(act==='editor')screen=e(Editor,{piece:pfe,go:go,onUpdate:onUpdate});
  else if(act==='ajustes')screen=e(Ajustes,{apiKey:apiKey,setModal:setModal});
  else screen=e(Home,sp);

  return e('div',null,
    modal?e(ApiModal,{onSave:onApiSave,onClose:function(){setModal(false)},cur:apiKey}):null,
    e('div',{style:{display:'flex',minHeight:'100vh',background:'#F7F7F6'}},
      e(Sidebar,{act:act,go:go,apiKey:apiKey,setModal:setModal,pieces:pieces}),
      screen
    )
  );
}

loadFonts().then(function(){
  ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));
});

})();
</script>
